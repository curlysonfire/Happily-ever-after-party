<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Date</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
background:black;
overflow:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:1;
}

.rsvp{
position:absolute;
top:75%;
width:100%;
text-align:center;
font-size:2rem;
color:white;
font-family:'Pacifico', cursive;
letter-spacing:2px;
z-index:2;
text-shadow:0 0 15px rgba(0,0,0,0.6);
}

.tap{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
opacity:.7;
font-size:14px;
color:white;
z-index:2;
}

</style>
</head>

<body>

<video id="bgvideo" autoplay loop muted playsinline>
<source src="YouCut_20260310_000551200.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="rsvp">
RSVP Coming Soon
</div>

<div class="tap">
Tap anywhere for sound
</div>

<script>

const video = document.getElementById("bgvideo");

document.body.addEventListener("click", () => {

video.muted = false;
video.play();

});

</script>

</body>
</html>
