<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:'Pacifico', cursive;
animation:fadeIn 2s ease;
}

/* video */

video{
width:60%;
max-width:900px;
border-radius:12px;
box-shadow:0 0 40px rgba(0,0,0,.8);
}

/* RSVP button */

.rsvp-btn{
margin-top:30px;
padding:14px 32px;
font-size:1.6rem;
color:white;
text-decoration:none;
font-family:Arial, sans-serif;
font-weight:bold;
border:2px solid white;
border-radius:40px;
letter-spacing:2px;
transition:all 0.3s ease;
}

.rsvp-btn:hover{
background:white;
color:black;
transform:scale(1.05);
}

/* tap text */

.tap{
margin-top:10px;
font-family:Arial, sans-serif;
font-size:14px;
opacity:.7;
}

/* fade in */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* mobile optimization */

@media (max-width:768px){
video{
width:90%;
}

.rsvp-btn{
font-size:1.3rem;
padding:12px 24px;
}
}

</style>
</head>

<body>

<video id="bgvideo" autoplay loop muted playsinline>
<source src="sora-s_69e9343ee8a481918603641b706ddadb.mp4" type="video/mp4">
</video>

<a href="https://www.theknot.com/us/moraleshappilyeverafter" target="_blank" class="rsvp-btn">
RSVP NOW
</a>

<div class="tap">
Tap video for sound
</div>

<script>

const video = document.getElementById("bgvideo");

video.addEventListener("click", () => {
video.muted = false;
video.play();
});

</script>

</body>
</html>
