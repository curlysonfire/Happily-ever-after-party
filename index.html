<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michael & Lexi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
font-family:Arial, sans-serif;
background:black;
color:white;
overflow:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:1;
}

.center-text{
position:absolute;
top:35%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:2;
}

h1{
font-size:4rem;
letter-spacing:3px;
margin-bottom:10px;
}

.date{
font-size:1.6rem;
}

.rsvp{
position:absolute;
top:75%;
left:50%;
transform:translate(-50%,-50%);
font-size:1.4rem;
letter-spacing:2px;
z-index:2;
opacity:.9;
}

.tap{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
opacity:.7;
font-size:14px;
z-index:2;
}

</style>
</head>

<body>

<video id="bgvideo" autoplay loop muted playsinline>
<source src="YouCut_20260310_000551200.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="center-text">
<h1>Michael & Lexi</h1>
<div class="date">November 7, 2026</div>
</div>

<div class="rsvp">
RSVP Coming Soon
</div>

<div class="tap">
Tap anywhere for sound
</div>

<script>

const video = document.getElementById("bgvideo");

document.body.addEventListener("click", () => {

video.muted = false;
video.play();

});

</script>

</body>
</html>
