<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michael & Lexi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 700px;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 4.8rem);
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .date {
      font-size: clamp(1.1rem, 3vw, 1.8rem);
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      padding: 16px 30px;
      border-radius: 999px;
      background: white;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
    }

    .note {
      margin-top: 18px;
      font-size: 0.95rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline>
    <source src="YouCut_20260310_000551200.mp4" type="video/mp4" />
  </video>

  <div class="overlay"></div>

  <main class="content">
    <div class="card">
      <h1>Michael & Lexi</h1>
      <div class="date">November 7, 2026</div>
      <a
        class="btn"
        href="https://www.theknot.com/us/YOUR-PAGE-HERE"
        target="_blank"
        rel="noopener noreferrer"
      >
        RSVP for November 7, 2026
      </a>
      <div class="note">Tap to open our RSVP page</div>
    </div>
  </main>
</body>
</html>
